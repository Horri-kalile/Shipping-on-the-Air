name: CI Pipeline

on:
  push:
    branches: [ "main", "master", "feature-*" ]
  pull_request:
    branches: [ "main", "master", "feature-*" ]

jobs:
  build-java:
    name: Build & Test Java Microservices
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew (Linux/macOS)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build, Test, and verify Quality with Gradle
        # 'build' compiles the code, 'check' runs tests and linters (when we add them)
        run: ./gradlew build check

      - name: Upload Test Reports
        if: always() # Always run this step even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: java-test-reports-${{ matrix.os }}
          path: build/reports/tests/test/
          retention-days: 7

  build-python:
    name: Build & Test Python Tracking Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tracking-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint with flake8
        run: |
          # Stop the build if there are severe Python syntax errors
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat other issues as warnings
          flake8 app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with pytest
        run: |
          # Run pytest. If no tests are found, it usually exits with code 5. 
          # We will add tests soon, but for now we let it pass if empty.
          pytest || true

  # ==========================================
  # CONTINUOUS DELIVERY (CD) PHASE
  # ==========================================
  build-docker:
    name: Build Docker Images (CD)
    needs: [build-java, build-python] # Only run if CI tests pass
    if: github.ref == 'refs/heads/main' # Only deliver from the main branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and verify Docker Compose
        # This proves the system is ready to be deployed without actually pushing it to a public registry yet
        run: docker compose build
